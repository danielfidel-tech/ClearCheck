version: "3.9"

services:
  db:
    image: postgres:15
    container_name: clearcheck_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clearcheck
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clearcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase
    container_name: clearcheck_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: clearcheck
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: postgres
      MB_DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
